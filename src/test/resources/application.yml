spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:library_demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: never

app:
  jwt:
    secret: library-demo-jwt-secret-key-2026-for-learning-only-32bytes
    expiration-minutes: 1440
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
